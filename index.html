<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Kaviya AMV Store | Premium Project Files</title>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }  :root {  
        --neon-purple: #b026ff;  
        --neon-blue: #00d9ff;  
        --neon-pink: #ff00ff;  
        --dark-bg: #050508;  
        --card-bg: #0a0a12;  
        --text-primary: #ffffff;  
        --text-secondary: #a0a0b0;  
        --accent-glow: rgba(176, 38, 255, 0.3);  
    }  

    body {  
        font-family: 'Rajdhani', sans-serif;  
        background: var(--dark-bg);  
        color: var(--text-primary);  
        overflow-x: hidden;  
        line-height: 1.6;  
    }  

    /* Animated Background */  
    .bg-animation {  
        position: fixed;  
        top: 0;  
        left: 0;  
        width: 100%;  
        height: 100%;  
        z-index: -1;  
        background:   
            radial-gradient(circle at 20% 50%, rgba(176, 38, 255, 0.15) 0%, transparent 50%),  
            radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),  
            radial-gradient(circle at 40% 20%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);  
        animation: bgPulse 8s ease-in-out infinite;  
    }  

    @keyframes bgPulse {  
        0%, 100% { opacity: 0.5; }  
        50% { opacity: 1; }  
    }  

    /* Navigation */  
    nav {  
        position: fixed;  
        top: 0;  
        width: 100%;  
        padding: 20px 5%;  
        display: flex;  
        justify-content: space-between;  
        align-items: center;  
        background: rgba(5, 5, 8, 0.8);  
        backdrop-filter: blur(20px);  
        border-bottom: 1px solid rgba(176, 38, 255, 0.2);  
        z-index: 1000;  
        transition: all 0.3s ease;  
    }  

    .logo {  
        font-family: 'Orbitron', sans-serif;  
        font-size: 1.8rem;  
        font-weight: 900;  
        background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));  
        -webkit-background-clip: text;  
        -webkit-text-fill-color: transparent;  
        text-transform: uppercase;  
        letter-spacing: 2px;  
        cursor: pointer;  
        position: relative;  
    }  

    .logo::after {  
        content: '';  
        position: absolute;  
        bottom: -5px;  
        left: 0;  
        width: 0;  
        height: 2px;  
        background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));  
        transition: width 0.3s ease;  
    }  

    .logo:hover::after {  
        width: 100%;  
    }  

    .nav-links {  
        display: flex;  
        gap: 30px;  
        list-style: none;  
    }  

    .nav-links a {  
        color: var(--text-secondary);  
        text-decoration: none;  
        font-weight: 500;  
        font-size: 1.1rem;  
        position: relative;  
        transition: color 0.3s ease;  
        text-transform: uppercase;  
        letter-spacing: 1px;  
    }  

    .nav-links a::before {  
        content: '';  
        position: absolute;  
        bottom: -5px;  
        left: 0;  
        width: 0;  
        height: 2px;  
        background: var(--neon-blue);  
        transition: width 0.3s ease;  
        box-shadow: 0 0 10px var(--neon-blue);  
    }  

    .nav-links a:hover {  
        color: var(--neon-blue);  
    }  

    .nav-links a:hover::before {  
        width: 100%;  
    }  

    .cart-icon {  
        position: relative;  
        cursor: pointer;  
        font-size: 1.5rem;  
        transition: transform 0.3s ease;  
    }  

    .cart-icon:hover {  
        transform: scale(1.1);  
        color: var(--neon-purple);  
    }  

    .cart-count {  
        position: absolute;  
        top: -10px;  
        right: -10px;  
        background: var(--neon-pink);  
        color: white;  
        font-size: 0.7rem;  
        padding: 2px 6px;  
        border-radius: 50%;  
        font-weight: 700;  
        opacity: 0;  
        transform: scale(0);  
        transition: all 0.3s ease;  
    }  

    .cart-count.active {  
        opacity: 1;  
        transform: scale(1);  
    }  

    /* Hero Section */  
    .hero {  
        margin-top: 80px;  
        padding: 120px 5%;  
        text-align: center;  
        position: relative;  
        overflow: hidden;  
    }  

    .hero::before {  
        content: '';  
        position: absolute;  
        top: 50%;  
        left: 50%;  
        transform: translate(-50%, -50%);  
        width: 600px;  
        height: 600px;  
        background: radial-gradient(circle, rgba(176, 38, 255, 0.2) 0%, transparent 70%);  
        animation: rotate 20s linear infinite;  
        z-index: -1;  
    }  

    @keyframes rotate {  
        from { transform: translate(-50%, -50%) rotate(0deg); }  
        to { transform: translate(-50%, -50%) rotate(360deg); }  
    }  

    .hero h1 {  
        font-family: 'Orbitron', sans-serif;  
        font-size: clamp(2.5rem, 8vw, 5rem);  
        font-weight: 900;  
        margin-bottom: 20px;  
        background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 50%, var(--neon-purple) 100%);  
        -webkit-background-clip: text;  
        -webkit-text-fill-color: transparent;  
        animation: shimmer 3s infinite;  
        text-transform: uppercase;  
        letter-spacing: 3px;  
    }  

    @keyframes shimmer {  
        0%, 100% { filter: brightness(1); }  
        50% { filter: brightness(1.3); }  
    }  

    .hero p {  
        font-size: 1.3rem;  
        color: var(--text-secondary);  
        max-width: 600px;  
        margin: 0 auto 40px;  
        font-weight: 300;  
    }  

    .cta-button {  
        display: inline-block;  
        padding: 15px 40px;  
        background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));  
        color: white;  
        text-decoration: none;  
        font-family: 'Orbitron', sans-serif;  
        font-weight: 700;  
        text-transform: uppercase;  
        letter-spacing: 2px;  
        border-radius: 50px;  
        position: relative;  
        overflow: hidden;  
        transition: transform 0.3s ease, box-shadow 0.3s ease;  
        border: none;  
        cursor: pointer;  
        font-size: 1rem;  
    }  

    .cta-button::before {  
        content: '';  
        position: absolute;  
        top: 0;  
        left: -100%;  
        width: 100%;  
        height: 100%;  
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);  
        transition: left 0.5s ease;  
    }  

    .cta-button:hover::before {  
        left: 100%;  
    }  

    .cta-button:hover {  
        transform: translateY(-3px);  
        box-shadow: 0 10px 30px rgba(176, 38, 255, 0.4);  
    }  

    /* Filters */  
    .filters {  
        padding: 40px 5%;  
        display: flex;  
        justify-content: center;  
        gap: 15px;  
        flex-wrap: wrap;  
    }  

    .filter-btn {  
        padding: 12px 30px;  
        background: transparent;  
        border: 2px solid rgba(176, 38, 255, 0.3);  
        color: var(--text-secondary);  
        font-family: 'Rajdhani', sans-serif;  
        font-weight: 700;  
        font-size: 1rem;  
        text-transform: uppercase;  
        letter-spacing: 1px;  
        cursor: pointer;  
        transition: all 0.3s ease;  
        border-radius: 30px;  
        position: relative;  
        overflow: hidden;  
    }  

    .filter-btn::before {  
        content: '';  
        position: absolute;  
        top: 0;  
        left: 0;  
        width: 0;  
        height: 100%;  
        background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));  
        transition: width 0.3s ease;  
        z-index: -1;  
    }  

    .filter-btn:hover, .filter-btn.active {  
        color: white;  
        border-color: transparent;  
        box-shadow: 0 0 20px rgba(176, 38, 255, 0.3);  
    }  

    .filter-btn:hover::before, .filter-btn.active::before {  
        width: 100%;  
    }  

    /* Products Grid */  
    .products {  
        padding: 40px 5%;  
        display: grid;  
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));  
        gap: 30px;  
        max-width: 1400px;  
        margin: 0 auto;  
    }  

    .card {  
        background: var(--card-bg);  
        border-radius: 20px;  
        overflow: hidden;  
        border: 1px solid rgba(255, 255, 255, 0.05);  
        transition: all 0.4s ease;  
        position: relative;  
        group: card;  
    }  

    .card::before {  
        content: '';  
        position: absolute;  
        top: 0;  
        left: 0;  
        right: 0;  
        bottom: 0;  
        background: linear-gradient(135deg, rgba(176, 38, 255, 0.1), rgba(0, 217, 255, 0.1));  
        opacity: 0;  
        transition: opacity 0.3s ease;  
        z-index: 0;  
    }  

    .card:hover {  
        transform: translateY(-10px);  
        border-color: rgba(176, 38, 255, 0.3);  
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(176, 38, 255, 0.2);  
    }  

    .card:hover::before {  
        opacity: 1;  
    }  

    .card-image {  
        position: relative;  
        height: 200px;  
        overflow: hidden;  
        cursor: pointer;  
    }  

    .card-image img {  
        width: 100%;  
        height: 100%;  
        object-fit: cover;  
        transition: transform 0.5s ease;  
    }  

    .card:hover .card-image img {  
        transform: scale(1.1);  
    }  

    .play-overlay {  
        position: absolute;  
        top: 50%;  
        left: 50%;  
        transform: translate(-50%, -50%) scale(0);  
        width: 60px;  
        height: 60px;  
        background: rgba(176, 38, 255, 0.9);  
        border-radius: 50%;  
        display: flex;  
        align-items: center;  
        justify-content: center;  
        transition: transform 0.3s ease;  
        backdrop-filter: blur(10px);  
        border: 2px solid rgba(255, 255, 255, 0.2);  
    }  

    .card:hover .play-overlay {  
        transform: translate(-50%, -50%) scale(1);  
    }  

    .play-icon {  
        width: 0;  
        height: 0;  
        border-left: 20px solid white;  
        border-top: 12px solid transparent;  
        border-bottom: 12px solid transparent;  
        margin-left: 5px;  
    }  

    .card-content {  
        padding: 25px;  
        position: relative;  
        z-index: 1;  
    }  

    .card-category {  
        display: inline-block;  
        padding: 5px 15px;  
        background: rgba(176, 38, 255, 0.2);  
        color: var(--neon-purple);  
        font-size: 0.8rem;  
        font-weight: 700;  
        text-transform: uppercase;  
        letter-spacing: 1px;  
        border-radius: 20px;  
        margin-bottom: 10px;  
        border: 1px solid rgba(176, 38, 255, 0.3);  
    }  

    .card h3 {  
        font-family: 'Orbitron', sans-serif;  
        font-size: 1.3rem;  
        margin-bottom: 10px;  
        color: var(--text-primary);  
    }  

    .card p {  
        color: var(--text-secondary);  
        font-size: 0.95rem;  
        margin-bottom: 15px;  
        line-height: 1.5;  
    }  

    .card-footer {  
        display: flex;  
        justify-content: space-between;  
        align-items: center;  
        margin-top: 20px;  
        padding-top: 20px;  
        border-top: 1px solid rgba(255, 255, 255, 0.1);  
    }  

    .price {  
        font-family: 'Orbitron', sans-serif;  
        font-size: 1.5rem;  
        font-weight: 700;  
        color: var(--neon-blue);  
        text-shadow: 0 0 10px rgba(0, 217, 255, 0.3);  
    }  

    .buy-btn {  
        padding: 10px 25px;  
        background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));  
        color: white;  
        border: none;  
        border-radius: 25px;  
        font-family: 'Rajdhani', sans-serif;  
        font-weight: 700;  
        font-size: 0.9rem;  
        text-transform: uppercase;  
        letter-spacing: 1px;  
        cursor: pointer;  
        transition: all 0.3s ease;  
        position: relative;  
        overflow: hidden;  
    }  

    .buy-btn::after {  
        content: '';  
        position: absolute;  
        top: 50%;  
        left: 50%;  
        width: 0;  
        height: 0;  
        background: rgba(255, 255, 255, 0.3);  
        border-radius: 50%;  
        transform: translate(-50%, -50%);  
        transition: width 0.6s ease, height 0.6s ease;  
    }  

    .buy-btn:hover::after {  
        width: 300px;  
        height: 300px;  
    }  

    .buy-btn:hover {  
        transform: scale(1.05);  
        box-shadow: 0 5px 20px rgba(176, 38, 255, 0.4);  
    }  

    /* Video Modal */  
    .modal {  
        display: none;  
        position: fixed;  
        top: 0;  
        left: 0;  
        width: 100%;  
        height: 100%;  
        background: rgba(0, 0, 0, 0.9);  
        backdrop-filter: blur(10px);  
        z-index: 2000;  
        justify-content: center;  
        align-items: center;  
        opacity: 0;  
        transition: opacity 0.3s ease;  
    }  

    .modal.active {  
        display: flex;  
        opacity: 1;  
    }  

    .modal-content {  
        width: 90%;  
        max-width: 900px;  
        background: var(--card-bg);  
        border-radius: 20px;  
        overflow: hidden;  
        border: 1px solid rgba(176, 38, 255, 0.3);  
        box-shadow: 0 0 50px rgba(176, 38, 255, 0.3);  
        transform: scale(0.8);  
        transition: transform 0.3s ease;  
    }  

    .modal.active .modal-content {  
        transform: scale(1);  
    }  

    .modal-header {  
        padding: 20px;  
        display: flex;  
        justify-content: space-between;  
        align-items: center;  
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);  
    }  

    .modal-title {  
        font-family: 'Orbitron', sans-serif;  
        font-size: 1.5rem;  
    }  

    .close-btn {  
        width: 40px;  
        height: 40px;  
        background: rgba(255, 255, 255, 0.1);  
        border: none;  
        border-radius: 50%;  
        color: white;  
        font-size: 1.5rem;  
        cursor: pointer;  
        transition: all 0.3s ease;  
        display: flex;  
        align-items: center;  
        justify-content: center;  
    }  

    .close-btn:hover {  
        background: rgba(255, 0, 0, 0.3);  
        transform: rotate(90deg);  
    }  

    .video-container {  
        position: relative;  
        padding-bottom: 56.25%;  
        height: 0;  
        overflow: hidden;  
        background: #000;  
    }  

    .video-container video, .video-container iframe {  
        position: absolute;  
        top: 0;  
        left: 0;  
        width: 100%;  
        height: 100%;  
    }

    .cart-sidebar {  
        position: fixed;  
        top: 0;  
        right: -400px;  
        width: 400px;  
        height: 100%;  
        background: var(--card-bg);  
        border-left: 1px solid rgba(176, 38, 255, 0.3);  
        z-index: 1500;  
        transition: right 0.4s ease;  
        display: flex;  
        flex-direction: column;  
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);  
    }  

    .cart-sidebar.active {  
        right: 0;  
    }  

    .cart-header {  
        padding: 30px;  
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);  
        display: flex;  
        justify-content: space-between;  
        align-items: center;  
    }  

    .cart-header h2 {  
        font-family: 'Orbitron', sans-serif;  
        font-size: 1.5rem;  
    }  

    .cart-items {  
        flex: 1;  
        overflow-y: auto;

    }  

    .cart-item:hover {  
        border-color: rgba(176, 38, 255, 0.3);  
        background: rgba(176, 38, 255, 0.05);  
    }  

    .cart-item img {  
        width: 80px;  
        height: 80px;  
        object-fit: cover;  
        border-radius: 10px;  
    }  

    .cart-item-details {

    .cart-item-title {

    }  

    .cart-item-price {
